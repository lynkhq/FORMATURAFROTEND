<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Formatura Ideal • Cadastro</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container row">
      <a class="brand" href="./index.html">
        <span class="mark">FI</span>
        <span>Formatura Ideal</span>
      </a>
      <nav class="nav">
        <a class="btn btn-ghost" href="./index.html">Home</a>
        <a class="btn btn-primary" href="./login.html">Área do Aluno</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container grid">
      <section class="card">
        <span class="chip">Cadastro Completo</span>
        <h1 class="h1">Crie seu acesso</h1>
        <p class="muted">Depois do cadastro, você já pode entrar e ver seu painel.</p>
        <div class="card" style="margin-top:12px">
          <div class="h2">Atenção</div>
          <p class="muted">A turma precisa existir no admin em <b>ClassPlan</b>. Se não existir, o backend pode responder erro.</p>
        </div>
      </section>

      <section class="card">
        <div class="h2">Dados do aluno</div>

        <form id="registerForm" class="form" novalidate style="margin-top:12px">
          <label class="field">
            <span class="label">Nome do aluno</span>
            <input id="student_name" type="text" placeholder="Nome completo" required>
          </label>

          <label class="field">
            <span class="label">Turma</span>
            <input id="turma" type="text" placeholder="Ex.: Terceirão" required>
            <span class="hint">Tem que bater com o ClassPlan do admin.</span>
          </label>

          <label class="field">
            <span class="label">Data de nascimento</span>
            <input id="birth_date" type="date" required>
          </label>

          <label class="field">
            <span class="label">Nome do responsável</span>
            <input id="responsible_name" type="text" placeholder="Nome do responsável" required>
          </label>

          <label class="field">
            <span class="label">CPF</span>
            <input id="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required>
          </label>

          <label class="field">
            <span class="label">E-mail</span>
            <input id="email" type="email" placeholder="email@exemplo.com" required>
          </label>

          <label class="field">
            <span class="label">Senha</span>
            <input id="password" type="password" minlength="6" placeholder="Crie uma senha" required>
          </label>


          <button class="btn btn-primary btn-block" id="btnRegister" type="submit">Criar conta</button>
          <div class="msg" id="registerMsg" role="alert" aria-live="polite"></div>

          <hr>
          <a class="btn btn-outline btn-block" href="./login.html">Já tenho conta • Entrar</a>
        </form>
      </section>
    </div>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/register.js"></script>
</body>
</html>
