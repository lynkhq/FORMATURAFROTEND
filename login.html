<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Formatura Ideal • Login</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <header class="header">
    <div class="container row">
      <a class="brand" href="./index.html">
        <span class="mark">FI</span>
        <span>Formatura Ideal</span>
      </a>
      <nav class="nav">
        <a class="btn btn-ghost" href="./index.html">Home</a>
        <a class="btn btn-outline" href="./register.html">Cadastro</a>
      </nav>
    </div>
  </header>

  <main class="main">
    <div class="container grid">
      <section class="card">
        <span class="chip">Área do Aluno</span>
        <h1 class="h1">Entrar</h1>
        <p class="muted">Use seu CPF e a senha criada no cadastro.</p>
        <p class="small">Dica: se estiver indo direto sem querer, limpe a sessão no botão “Sair” do painel ou na Home.</p>
      </section>

      <section class="card">
        <div class="h2">Login</div>
        <form id="loginForm" class="form" novalidate style="margin-top:12px">
          <label class="field">
            <span class="label">CPF</span>
            <input id="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" required>
          </label>

          <label class="field">
            <span class="label">Senha</span>
            <input id="password" type="password" placeholder="Sua senha" required>
          </label>

          <button class="btn btn-primary btn-block" id="btnLogin" type="submit">Entrar</button>
          <div class="msg" id="loginMsg" role="alert" aria-live="polite"></div>

          <hr>
          <a class="btn btn-outline btn-block" href="./register.html">Não tenho conta • Cadastrar</a>
        </form>
      </section>
    </div>
  </main>

  <script src="./js/api.js"></script>
  <script src="./js/login.js"></script>
</body>
</html>
